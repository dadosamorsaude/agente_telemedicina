services:
  - type: web
    name: agente-telemedicina
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: db-agente-telemedicina
          property: connectionString
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: ATHENA_S3_STAGING_DIR
        sync: false
      - key: ATHENA_DATABASE
        sync: false
      - key: API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        sync: false

databases:
  - name: db-agente-telemedicina
    plan: free
